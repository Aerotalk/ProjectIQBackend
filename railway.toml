[build]
builder = "NIXPACKS"

[deploy]
# Point to the new custom health check endpoint
healthcheckPath = "/health"
# The deployment will wait up to 100 seconds for a 200 OK response from the health check
healthcheckTimeout = 100
# Restart the container automatically if it crashes
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
